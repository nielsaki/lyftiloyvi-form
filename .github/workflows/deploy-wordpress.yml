# Deploy this plugin folder to your WordPress server on every push to main/master.
#
# 1. Create a GitHub repository and push this project (see instructions in the PR / chat).
# 2. In the GitHub repo: Settings → Secrets and variables → Actions → New repository secret:
#    - FTP_SERVER    (e.g. ftp.yourhost.com or your server IP)
#    - FTP_USERNAME
#    - FTP_PASSWORD  (or app-specific password if your host supports it)
#    - FTP_REMOTE_DIR  (full path on the server to the plugin folder, must end with /)
#      Example: /public_html/wp-content/plugins/lyftiloyvi-form/
#      Or: /domains/example.fo/public_html/wp-content/plugins/lyftiloyvi-form/
#
# 3. Adjust "branches" below if you use a different default branch.
#
# test.php lives in Git for local testing but is NOT uploaded (exclude list).
# It also refuses to run under a normal web server if placed inside WordPress.
#
# If your host only offers SFTP (not FTP), use an SFTP/rsync deploy action instead.
#
# Why the first deploy feels slow: FTP uploads many small files one-by-one. Dompdf’s
# vendor tree is large. After the first successful run, FTP-Deploy-Action keeps a
# sync state on the server and later pushes mostly only changed files (much faster).

name: Deploy to WordPress

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:   # Actions tab → Deploy to WordPress → Run workflow (no new commit needed)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy plugin via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          local-dir: ./
          log-level: minimal
          exclude: |
            **/.git*
            **/.github/**
            **/.DS_Store
            test_db.json
            test_pdfs/**
            test.php
            **/vendor/**/phpunit.xml*
            **/vendor/**/*.md
            **/vendor/**/LICENSE*
            **/vendor/**/CHANGELOG*
            **/vendor/**/UPGRADING*
            **/vendor/**/AUTHORS*
            **/vendor/**/CREDITS*
            **/vendor/**/RELEASE.md
            **/vendor/**/bin/**
 